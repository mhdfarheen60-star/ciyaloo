<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CIYALOO</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="register-page">

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">

            <a class="navbar-brand" href="index.html">
                CIYALOO
            </a>

            <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#authMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="authMenu">

                <ul class="navbar-nav mx-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="shop.html">Shop</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="register.html">Register</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="login.html">Login</a>
                    </li>

                </ul>

            </div>

        </div>
    </nav>

    <!-- Login Section -->
    <main class="register-main">

        <div class="register-card">

            <h2 class="text-center fw-bold mb-4">
                LOGIN
            </h2>

            <form class="register-form">

                <div class="d-grid gap-2 col-6 mx-auto mb-3">
                    <input
                        type="email"
                        class="form-control"
                        placeholder="Email"
                        required>
                </div>

                <div class="d-grid gap-2 col-6 mx-auto mb-2">
                    <div class="input-group">

                        <input
                            type="password"
                            id="password"
                            class="form-control"
                            placeholder="Password"
                            required>

                        <button
                            class="btn btn-outline-secondary"
                            type="button"
                            onclick="togglePassword()">

                            <i class="bi bi-eye" id="eye"></i>

                        </button>

                    </div>
                </div>

                <div class="text-center mb-4">
                    <a href="#" class="small text-decoration-none">
                        Forgot password?
                    </a>
                </div>

                <div class="d-grid gap-2 col-6 mx-auto">
                    <button
                        type="submit"
                        class="btn btn-primary py-2 rounded-3">
                        LOGIN
                    </button>
                </div>

                <div class="text-center mt-3">
                    Don't have an account?
                    <a href="register.html" class="text-decoration-none">
                        Signup
                    </a>
                </div>

                <div class="divider my-4">
                    <span>Or</span>
                </div>

                <div class="d-grid gap-2 col-6 mx-auto">
                    <button class="btn btn-primary">
                        <i class="bi bi-facebook me-2"></i>
                        Login with Facebook
                    </button>
                </div>

                <div class="d-grid gap-2 col-6 mx-auto mt-3">
                    <button class="btn btn-outline-secondary">
                        <i class="bi bi-google me-2"></i>
                        Login with Google
                    </button>
                </div>

            </form>

        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function togglePassword(){
            const password=document.getElementById("password");
            const eye=document.getElementById("eye");

            if(password.type==="password"){
                password.type="text";
                eye.className="bi bi-eye-slash";
            }else{
                password.type="password";
                eye.className="bi bi-eye";
            }
        }
    </script>

</body>
</html>
