<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Contact - CIYALOO</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    .whatsapp-page {
      background-color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Poppins', sans-serif;
    }

    .whatsapp-navbar {
      background: #fff;
      padding: 20px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .whatsapp-navbar .navbar-brand {
      font-family: 'Poppins', sans-serif;
      font-size: 24px;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: 1.5px;
    }

    .whatsapp-navbar .nav-link {
      color: #555 !important;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 8px 16px;
      transition: color 0.3s ease;
    }

    .whatsapp-navbar .nav-link:hover {
      color: #7A5C3E !important;
    }

    .whatsapp-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    .whatsapp-card {
      max-width: 480px;
      width: 100%;
      text-align: center;
      padding: 60px 40px;
    }

    .whatsapp-logo {
      width: 100px;
      height: 100px;
      margin: 0 auto 30px;
      background: #25D366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 30px rgba(37, 211, 102, 0.25);
    }

    .whatsapp-logo i {
      font-size: 56px;
      color: #fff;
    }

    .whatsapp-business-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .whatsapp-subtitle {
      font-size: 15px;
      color: #777;
      margin-bottom: 40px;
      font-weight: 300;
      letter-spacing: 0.3px;
    }

    .whatsapp-btn-primary {
      display: block;
      width: 100%;
      padding: 16px 24px;
      background: #25D366;
      color: #fff;
      border: none;
      border-radius: 50px;
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
      margin-bottom: 16px;
    }

    .whatsapp-btn-primary:hover {
      background: #20bd5a;
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
    }

    .whatsapp-btn-secondary {
      display: block;
      width: 100%;
      padding: 14px 24px;
      background: transparent;
      color: #25D366;
      border: 1.5px solid #25D366;
      border-radius: 50px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-decoration: none;
      transition: all 0.3s ease;
      margin-bottom: 50px;
    }

    .whatsapp-btn-secondary:hover {
      background: rgba(37, 211, 102, 0.06);
      color: #1da851;
      border-color: #1da851;
    }

    .whatsapp-footer-text {
      font-size: 13px;
      color: #999;
      margin-bottom: 12px;
      font-weight: 300;
    }

    .whatsapp-download-link {
      color: #25D366;
      text-decoration: underline;
      text-underline-offset: 3px;
      font-weight: 400;
      transition: color 0.3s ease;
    }

    .whatsapp-download-link:hover {
      color: #1da851;
    }

    .whatsapp-footer {
      background: #fff;
      padding: 30px 0;
      border-top: 1px solid #f0f0f0;
      text-align: center;
    }

    .whatsapp-footer p {
      font-size: 13px;
      color: #aaa;
      margin: 0;
      font-weight: 300;
    }

    .whatsapp-footer a {
      color: #7A5C3E;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .whatsapp-footer a:hover {
      color: #5a432d;
    }

    @media (max-width: 576px) {
      .whatsapp-card {
        padding: 40px 24px;
      }

      .whatsapp-logo {
        width: 80px;
        height: 80px;
        margin-bottom: 24px;
      }

      .whatsapp-logo i {
        font-size: 44px;
      }

      .whatsapp-business-name {
        font-size: 28px;
      }

      .whatsapp-subtitle {
        font-size: 14px;
        margin-bottom: 32px;
      }
    }
  </style>
</head>
<body class="whatsapp-page">

  <nav class="navbar navbar-expand-lg whatsapp-navbar">
    <div class="container">
      <a class="navbar-brand" href="index.html">CIYALOO</a>

        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="waMenu">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="signature.html">Signature Perfume</a></li>
          <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>

        <div class="nav-icons d-flex align-items-center">
          <i class="bi bi-search" style="font-size: 20px; color: #555; margin-right: 18px; cursor: pointer;"></i>
          <a href="login.html" class="cart-link" aria-label="Login" style="color: #555; text-decoration: none; margin-right: 18px;">
            <i class="bi bi-person" style="font-size: 20px;"></i>
          </a>
          <a href="register.html" class="cart-link" aria-label="Register" style="color: #555; text-decoration: none; margin-right: 18px; font-size: 13px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase;">
            Register
          </a>
          <a href="cart.html" class="cart-link" aria-label="Cart" style="position: relative; display: inline-flex; align-items: center; margin-left: 18px; color: #555; text-decoration: none;">
            <i class="bi bi-cart3" style="font-size: 20px;"></i>
            <span class="cart-badge" style="position: absolute; top: -8px; right: -10px; background: #7A5C3E; color: #fff; border-radius: 50%; font-size: 10px; padding: 2px 6px; line-height: 1; font-weight: 500; min-width: 18px; text-align: center;">0</span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <main class="whatsapp-main">
    <div class="whatsapp-card">
      <div class="whatsapp-logo">
        <i class="bi bi-whatsapp"></i>
      </div>

      <h1 class="whatsapp-business-name">CIYALOO</h1>
      <p class="whatsapp-subtitle">Connect with us directly on WhatsApp</p>

      <a href="https://wa.me/971553366389?text=Hello%20I%20would%20like%20to%20know%20more." target="_blank" rel="noopener noreferrer" class="whatsapp-btn-primary">
        <i class="bi bi-whatsapp me-2"></i>
        Open WhatsApp
      </a>

      <a href="https://web.whatsapp.com" target="_blank" rel="noopener noreferrer" class="whatsapp-btn-secondary">
        Continue to WhatsApp Web
      </a>

      <p class="whatsapp-footer-text">
        Don't have the app?
        <a href="https://www.whatsapp.com/download" target="_blank" rel="noopener noreferrer" class="whatsapp-download-link">Download it now</a>
      </p>
    </div>
  </main>

  <footer class="whatsapp-footer">
    <div class="container">
      <p>&copy; 2025 <a href="index.html">CIYALOO</a>. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="cart.js"></script>
